<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">CCLimitPing social preview</title>
  <desc id="desc">GitHub social preview image for CCLimitPing.</desc>
  <defs>
    <linearGradient id="sp-bg" x1="80" y1="42" x2="1196" y2="604" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#142238"/>
      <stop offset="0.52" stop-color="#101827"/>
      <stop offset="1" stop-color="#141321"/>
    </linearGradient>
    <linearGradient id="sp-ring" x1="126" y1="160" x2="404" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#66E4FF"/>
      <stop offset="0.56" stop-color="#59F3B6"/>
      <stop offset="1" stop-color="#FFD166"/>
    </linearGradient>
    <linearGradient id="sp-card" x1="96" y1="96" x2="452" y2="544" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17253A"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="sp-quota" x1="226" y1="386" x2="352" y2="386" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#66E4FF"/>
      <stop offset="0.55" stop-color="#59F3B6"/>
      <stop offset="1" stop-color="#FFD166"/>
    </linearGradient>
    <pattern id="sp-grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="2"/>
    </pattern>
    <filter id="sp-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#sp-bg)"/>
  <rect width="1280" height="640" fill="url(#sp-grid)" opacity="0.72"/>
  <circle cx="1012" cy="58" r="360" fill="#66E4FF" opacity="0.055"/>
  <circle cx="108" cy="594" r="296" fill="#59F3B6" opacity="0.05"/>

  <g filter="url(#sp-shadow)">
    <rect x="94" y="94" width="452" height="452" rx="112" fill="#101827" opacity="0.72"/>
    <circle cx="320" cy="320" r="160" fill="none" stroke="#263247" stroke-width="28"/>
    <circle cx="320" cy="320" r="160" fill="none" stroke="url(#sp-ring)" stroke-width="28"
            pathLength="100" stroke-linecap="round" stroke-dasharray="69 9 5 17"
            transform="rotate(-90 320 320)"/>
    <circle cx="320" cy="320" r="126" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"
            stroke-dasharray="2 16"/>
    <circle cx="446" cy="222" r="34" fill="#FFD166" opacity="0.14"/>
    <circle cx="446" cy="222" r="21" fill="none" stroke="#FFD166" stroke-width="5" opacity="0.65"/>
    <circle cx="446" cy="222" r="9" fill="#FFE9A6"/>

    <rect x="212" y="238" width="216" height="164" rx="32" fill="url(#sp-card)" stroke="#B7F7FF" stroke-opacity="0.22" stroke-width="2"/>
    <path d="M234 272H406" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="3" stroke-linecap="round"/>
    <circle cx="250" cy="256" r="6" fill="#FF6B6B"/>
    <circle cx="270" cy="256" r="6" fill="#FFD166"/>
    <circle cx="290" cy="256" r="6" fill="#59F3B6"/>
    <path d="M252 315L276 336L252 357" fill="none" stroke="#66E4FF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="344" y="351" text-anchor="middle"
          font-family="Inter, SF Pro Display, Segoe UI, Helvetica, Arial, sans-serif"
          font-size="72" font-weight="800" fill="#F8FAFC">LP</text>
    <rect x="226" y="386" width="126" height="12" rx="6" fill="#22304A"/>
    <rect x="226" y="386" width="96" height="12" rx="6" fill="url(#sp-quota)"/>
    <circle cx="330" cy="392" r="10" fill="#FFD166"/>
  </g>

  <g font-family="Inter, SF Pro Display, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="608" y="278" font-size="86" font-weight="800" fill="#F8FAFC">CCLimitPing</text>
    <text x="612" y="330" font-size="31" font-weight="500" fill="#B9C7D9">
      <tspan x="612">Keep Claude Code and Codex limit windows</tspan>
      <tspan x="612" dy="42">back-to-back.</tspan>
    </text>
    <g font-size="24" font-weight="700">
      <rect x="612" y="438" width="158" height="50" rx="25" fill="#66E4FF" fill-opacity="0.12" stroke="#66E4FF" stroke-opacity="0.28"/>
      <text x="691" y="472" text-anchor="middle" fill="#9AECFF">5h windows</text>
      <rect x="794" y="438" width="210" height="50" rx="25" fill="#59F3B6" fill-opacity="0.11" stroke="#59F3B6" stroke-opacity="0.26"/>
      <text x="899" y="472" text-anchor="middle" fill="#A6F9D6">zero-quota usage</text>
      <rect x="1028" y="438" width="128" height="50" rx="25" fill="#FFD166" fill-opacity="0.12" stroke="#FFD166" stroke-opacity="0.3"/>
      <text x="1092" y="472" text-anchor="middle" fill="#FFE39A">CLI ping</text>
    </g>
  </g>
</svg>
